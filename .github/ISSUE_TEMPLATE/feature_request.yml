name: 💡 Feature request
description: Suggest a new feature or an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please [check existing issues](https://github.com/Samurai33/CyberJust/issues) first — your idea may already be tracked.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve? Who is it for? Describe the situation, not just the solution.
      placeholder: As a visitor, I want to ... so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What should happen? Describe the expected behavior as concretely as you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you'd prefer the proposal above.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Homepage / marketing sections
        - Episodes list or episode detail
        - Audio player
        - Dashboard
        - SEO / metadata
        - Accessibility
        - Performance
        - Developer experience / tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope & goals fit
      description: How does this fit the project's scope and goals? Any constraints to keep in mind?
    validations:
      required: false
