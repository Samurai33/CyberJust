name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # pnpm 10+ withholds native postinstall scripts (e.g. sharp) pending explicit
      # approval; --frozen-lockfile install succeeds but leaves them unbuilt, which
      # breaks `next build`. Approve them non-interactively so image optimization works.
      - name: Approve native build scripts
        run: pnpm approve-builds --all

      # `pnpm lint` is intentionally not run here: this repo has no ESLint config yet
      # (`next lint` needs an interactive setup prompt on first run). Tracked separately.
      - name: Build
        run: pnpm build
