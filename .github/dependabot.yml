version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
    ignore:
      # typescript-eslint has no TS 7 support yet (no stable programmatic API
      # until TS 7.1 — https://typescript-eslint.io/users/dependency-versions/).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # eslint-plugin-import/react/react-hooks/jsx-a11y (pulled in via
      # eslint-config-next) don't declare ESLint 10 support yet
      # (vercel/next.js#91702). Revisit both together once typescript-eslint
      # and the plugin ecosystem catch up (see issue #78).
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
